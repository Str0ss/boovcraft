<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1280">
    <title>Boovcraft Replay Visualizer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="app">
      <header class="page-header">
        <h1>Boovcraft Replay Visualizer</h1>
        <p class="instruction">
          Pick a <code>.analysis.json</code> produced by
          <code>processor/analyze.py</code>, or drag one onto this page.
        </p>
        <p class="picker">
          <label for="picker" class="picker-label">Choose analysis file:</label>
          <input type="file" id="picker" accept=".json,application/json">
        </p>
      </header>
      <div id="error" class="error" role="alert" hidden></div>
      <div id="report" hidden></div>
    </main>
    <div id="dropzone" hidden>
      <div class="dropzone-cue">Drop to load</div>
    </div>
    <script src="visualizer.js" defer></script>
  </body>
</html>
